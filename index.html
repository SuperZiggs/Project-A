    <script>
        onload = () => {
            const c = setTimeout(() => {
                document.body.classList.remove("not-loaded");
                clearTimeout(c);
            }, 800);
            initSparkles();
            initCanvas();
        };

        // ===== SPARKLES =====
        function initSparkles() {
            const container = document.getElementById('sparklesContainer');
            const emojis = ['✨', '⭐', '💫', '🌟', '💕', '🌸', '❤️'];
            for (let i = 0; i < 22; i++) {
                const s = document.createElement('span');
                s.classList.add('sparkle');
                s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                s.style.cssText = `
                left:${Math.random() * 100}vw;
                top:${Math.random() * 100}vh;
                font-size:${Math.random() * 14 + 8}px;
                animation-duration:${Math.random() * 4 + 3}s;
                animation-delay:${Math.random() * 5}s;
            `;
                container.appendChild(s);
            }
        }

        // ===== CANVAS PARTICLES =====
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const EMOJIS = ['❤️', '💕', '🌸', '💗', '💖', '✨', '🌺'];

        class Particle {
            constructor(x, y, burst) {
                this.x = x !== undefined ? x : Math.random() * canvas.width;
                this.y = y !== undefined ? y : canvas.height + 20;
                this.emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
                this.size = burst ? Math.random() * 22 + 14 : Math.random() * 18 + 8;
                this.speedX = (Math.random() - 0.5) * (burst ? 6 : 1.5);
                this.speedY = burst ? -(Math.random() * 8 + 4) : -(Math.random() * 1.2 + 0.5);
                this.gravity = burst ? 0.15 : 0.02;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.08;
                this.life = 1;
                this.decay = burst ? Math.random() * 0.018 + 0.012 : Math.random() * 0.005 + 0.003;
            }
            update() {
                this.x += this.speedX;
                this.speedY += this.gravity;
                this.y += this.speedY;
                this.rotation += this.rotSpeed;
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.font = this.size + 'px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
            isDead() { return this.life <= 0; }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() < 0.35) particles.push(new Particle());
            particles = particles.filter(p => !p.isDead());
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateCanvas);
        }

        function initCanvas() { animateCanvas(); }

        function shootHearts() {
            const btn = document.getElementById('ctaBtn');
            btn.classList.add('clicked');
            setTimeout(() => btn.classList.remove('clicked'), 600);
            const cx = canvas.width / 2, cy = canvas.height * 0.52;
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    particles.push(new Particle(cx + (Math.random() - 0.5) * 80, cy, true));
                }, i * 18);
            }
        }

        document.getElementById('ctaBtn').addEventListener('click', shootHearts);

        document.addEventListener('click', function (e) {
            if (e.target.closest('#ctaBtn')) return;
            for (let i = 0; i < 8; i++) {
                particles.push(new Particle(e.clientX, e.clientY, true));
            }
        });
    </script>
